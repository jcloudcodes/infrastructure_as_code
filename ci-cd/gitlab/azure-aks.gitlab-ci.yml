stages:
  - validate
  - plan
  - apply
  - destroy

variables:
  TF_ROOT: "clouds/azure/aks"
  TF_VARS_FILE: "aks.auto.tfvars"
  TF_STATE_KEY: "infra/azure/aks/terraform.tfstate"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

default:
  image:
    name: hashicorp/terraform:1.9.8
    entrypoint: [""]
  before_script:
    - cd "$TF_ROOT"
    - terraform version
    - |
      if [ -n "${TF_BACKEND_RESOURCE_GROUP:-}" ] && [ -n "${TF_BACKEND_STORAGE_ACCOUNT:-}" ] && [ -n "${TF_BACKEND_CONTAINER:-}" ]; then
        terraform init \
          -input=false \
          -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
          -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
          -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
          -backend-config="key=${TF_STATE_KEY}"
      else
        terraform init -input=false
      fi

terraform_validate:
  stage: validate
  script:
    - terraform fmt -check -recursive
    - terraform validate
  rules:
    - when: always

terraform_plan:
  stage: plan
  script:
    - terraform plan -input=false -var-file="${TF_VARS_FILE}" -out=tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/tfplan
    expire_in: 1 day
  rules:
    - if: '$TF_ACTION == "plan"'
    - if: '$TF_ACTION == "apply"'
    - when: never

terraform_apply:
  stage: apply
  script:
    - terraform apply -input=false tfplan
  dependencies:
    - terraform_plan
  when: manual
  rules:
    - if: '$TF_ACTION == "apply"'
    - when: never

terraform_destroy:
  stage: destroy
  script:
    - terraform destroy -input=false -auto-approve -var-file="${TF_VARS_FILE}"
  when: manual
  rules:
    - if: '$TF_ACTION == "destroy"'
    - when: never
