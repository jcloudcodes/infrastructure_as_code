name: Azure AKS Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'clouds/azure/aks/**'
      - 'ci-cd/github_action/aks/**'
      - '.github/workflows/azure-aks-terraform.yml'
  workflow_dispatch:
    inputs:
      tf_action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      tf_working_dir:
        description: Path to the AKS Terraform folder
        required: true
        default: clouds/azure/aks
        type: string
      tf_vars_file:
        description: Terraform variable file
        required: true
        default: aks.auto.tfvars
        type: string
      tf_state_key:
        description: Remote backend state key when backend secrets are configured
        required: true
        default: infra/azure/aks/terraform.tfstate
        type: string

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  format:
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: ${{ github.event_name == 'push' && 'clouds/azure/aks' || inputs.tf_working_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

  init_validate:
    runs-on: ubuntu-latest
    needs: format
    env:
      TF_WORKING_DIR: ${{ github.event_name == 'push' && 'clouds/azure/aks' || inputs.tf_working_dir }}
      TF_STATE_KEY: ${{ github.event_name == 'push' && 'infra/azure/aks/terraform.tfstate' || inputs.tf_state_key }}
      TF_BACKEND_RESOURCE_GROUP: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Require Backend Configuration
        run: |
          test -n "${TF_BACKEND_RESOURCE_GROUP}" || { echo "Missing TF_BACKEND_RESOURCE_GROUP secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_STORAGE_ACCOUNT}" || { echo "Missing TF_BACKEND_STORAGE_ACCOUNT secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_CONTAINER}" || { echo "Missing TF_BACKEND_CONTAINER secret. Run Azure TFState Bootstrap first."; exit 1; }
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}"
      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: init_validate
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tf_action == 'apply') }}
    env:
      TF_WORKING_DIR: ${{ github.event_name == 'push' && 'clouds/azure/aks' || inputs.tf_working_dir }}
      TF_VARS_FILE: ${{ github.event_name == 'push' && 'aks.auto.tfvars' || inputs.tf_vars_file }}
      TF_STATE_KEY: ${{ github.event_name == 'push' && 'infra/azure/aks/terraform.tfstate' || inputs.tf_state_key }}
      TF_BACKEND_RESOURCE_GROUP: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Require Backend Configuration
        run: |
          test -n "${TF_BACKEND_RESOURCE_GROUP}" || { echo "Missing TF_BACKEND_RESOURCE_GROUP secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_STORAGE_ACCOUNT}" || { echo "Missing TF_BACKEND_STORAGE_ACCOUNT secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_CONTAINER}" || { echo "Missing TF_BACKEND_CONTAINER secret. Run Azure TFState Bootstrap first."; exit 1; }
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}"
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -input=false \
            -var-file="${TF_VARS_FILE}" \
            -out=tfplan
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v6
        with:
          name: azure-aks-tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.tf_action == 'apply' }}
    env:
      TF_WORKING_DIR: ${{ inputs.tf_working_dir }}
      TF_STATE_KEY: ${{ inputs.tf_state_key }}
      TF_BACKEND_RESOURCE_GROUP: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Require Backend Configuration
        run: |
          test -n "${TF_BACKEND_RESOURCE_GROUP}" || { echo "Missing TF_BACKEND_RESOURCE_GROUP secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_STORAGE_ACCOUNT}" || { echo "Missing TF_BACKEND_STORAGE_ACCOUNT secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_CONTAINER}" || { echo "Missing TF_BACKEND_CONTAINER secret. Run Azure TFState Bootstrap first."; exit 1; }
      - name: Download Plan Artifact
        uses: actions/download-artifact@v5
        with:
          name: azure-aks-tfplan
          path: ${{ env.TF_WORKING_DIR }}
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}"
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
      - name: Show AKS Details
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          az login --service-principal \
            --username "${ARM_CLIENT_ID}" \
            --password "${ARM_CLIENT_SECRET}" \
            --tenant "${ARM_TENANT_ID}" \
            --output none
          az account set --subscription "${ARM_SUBSCRIPTION_ID}"
          RESOURCE_GROUP_NAME="$(terraform output -raw resource_group_name)"
          CLUSTER_NAME="$(terraform output -raw cluster_name)"
          az aks show \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --name "${CLUSTER_NAME}" \
            --query "{name:name,location:location,kubernetesVersion:kubernetesVersion,resourceGroup:resourceGroup,nodeResourceGroup:nodeResourceGroup,provisioningState:provisioningState,fqdn:fqdn}" \
            --output table

  destroy:
    runs-on: ubuntu-latest
    needs: init_validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.tf_action == 'destroy' }}
    env:
      TF_WORKING_DIR: ${{ inputs.tf_working_dir }}
      TF_VARS_FILE: ${{ inputs.tf_vars_file }}
      TF_STATE_KEY: ${{ inputs.tf_state_key }}
      TF_BACKEND_RESOURCE_GROUP: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Require Backend Configuration
        run: |
          test -n "${TF_BACKEND_RESOURCE_GROUP}" || { echo "Missing TF_BACKEND_RESOURCE_GROUP secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_STORAGE_ACCOUNT}" || { echo "Missing TF_BACKEND_STORAGE_ACCOUNT secret. Run Azure TFState Bootstrap first."; exit 1; }
          test -n "${TF_BACKEND_CONTAINER}" || { echo "Missing TF_BACKEND_CONTAINER secret. Run Azure TFState Bootstrap first."; exit 1; }
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}"
      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy \
            -input=false \
            -auto-approve \
            -var-file="${TF_VARS_FILE}"
