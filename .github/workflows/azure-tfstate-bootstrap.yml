name: Azure TFState Bootstrap

on:
  workflow_dispatch:
    inputs:
      tf_action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      tf_working_dir:
        description: Path to the TFState Terraform folder
        required: true
        default: clouds/azure/tfstate
        type: string
      tf_vars_file:
        description: Terraform variable file
        required: true
        default: tfstate.auto.tfvars
        type: string

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform Format Check
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform fmt -check -recursive

  init_validate:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform Init
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform init -input=false
      - name: Terraform Validate
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: init_validate
    if: ${{ inputs.tf_action == 'plan' || inputs.tf_action == 'apply' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform Init
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform init -input=false
      - name: Terraform Plan
        working-directory: ${{ inputs.tf_working_dir }}
        run: |
          terraform plan \
            -input=false \
            -var-file="${{ inputs.tf_vars_file }}" \
            -out=tfplan
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-tfstate-tfplan
          path: ${{ inputs.tf_working_dir }}/tfplan

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ inputs.tf_action == 'apply' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-tfstate-tfplan
          path: ${{ inputs.tf_working_dir }}
      - name: Terraform Init
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform init -input=false
      - name: Terraform Apply
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform apply -input=false -auto-approve tfplan

  destroy:
    runs-on: ubuntu-latest
    needs: init_validate
    if: ${{ inputs.tf_action == 'destroy' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform Init
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform init -input=false
      - name: Terraform Destroy
        working-directory: ${{ inputs.tf_working_dir }}
        run: |
          terraform destroy \
            -input=false \
            -auto-approve \
            -var-file="${{ inputs.tf_vars_file }}"
